<!DOCTYPE html>
<html lang="en">f
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>the Phil App</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: #fff; font-family: sans-serif;
            overflow: hidden;
        }
        .container { 
            display: flex; flex-direction: column; height: 100vh; width: 100vw; 
        }
        
        /* 40/60 Split */
        .top-half { 
            height: 40vh; position: relative; 
            background: #000; display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center;
            border-bottom: 1px solid #333;
            z-index: 2;
            box-sizing: border-box;
        }

        .bottom-half { 
            height: 60vh; 
            background: #000; 
            overflow: hidden; 
            position: relative;
            width: 100%;
        }

        #tank-frame {
            position: absolute;
            top: 0; left: 0; border: none;
            width: 1400px; height: 1800px;
            transform-origin: 0 0;
            background: #000;
        }
        
        .controls {
            margin-top: 8px; width: 94%;
            display: flex; justify-content: space-between; gap: 8px; z-index: 10;
        }

        .btn-group { display: flex; gap: 8px; }

        select, button {
            background: #1a1a1a; color: #fff; border: 1px solid #444; 
            padding: 6px 10px; font-size: 0.85rem; border-radius: 4px;
            outline: none;
        }
        
        #engage-btn.active { background: #dc3545; border-color: #ff0000; }
        #reload-tank { background: #333; }

        /* Gauge fits within 40vh */
        #gauge-svg { 
            height: 78%; 
            max-width: 98vw; 
            margin-top: -5px; 
        }
        
        .digital-speed { font-size: 26px; font-weight: bold; fill: #00ff00; }
        .digital-unit { font-size: 8px; fill: #666; letter-spacing: 1.5px; }
    </style>
</head>
<link rel="manifest" href="tank.json">
<body>

<div class="container">
    <div class="top-half">
        <div class="controls">
            <select id="target-speed"></select>
            <div class="btn-group">
                <button id="reload-tank" onclick="reloadIframe()">Reload Tank</button>
                <button id="engage-btn">ENGAGE</button>
            </div>
        </div>

        <svg id="gauge-svg" viewBox="0 8 200 127">
            <path d="M 15 100 A 85 85 0 0 1 185 100" fill="none" stroke="#222" stroke-width="7" stroke-linecap="round"/>
            <path d="M 15 100 A 85 85 0 0 1 185 100" fill="none" stroke="#ffcc00" stroke-width="7" />
            <path d="M 100 15 A 85 85 0 0 1 143.2 26.5" fill="none" stroke="#00ff00" stroke-width="7" transform="rotate(-27 100 100)" />
            <path d="M 100 15 A 85 85 0 0 0 56.8 26.5" fill="none" stroke="#00ff00" stroke-width="7" transform="rotate(27 100 100)" />

            <g stroke="#000" stroke-width="1.2">
                <line x1="100" y1="15" x2="100" y2="28" />
                <script>
                    const g = document.currentScript.parentElement;
                    for(let i=-90; i<=90; i+=9) {
                        if(i===0) continue;
                        const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        l.setAttribute("x1", "100"); l.setAttribute("y1", "15");
                        l.setAttribute("x2", "100"); l.setAttribute("y2", "23");
                        l.setAttribute("transform", `rotate(${i} 100 100)`);
                        g.appendChild(l);
                    }
                </script>
            </g>

            <text x="100" y="122" text-anchor="middle" class="digital-speed" id="speed-val">0</text>
            <text x="100" y="130" text-anchor="middle" class="digital-unit">KTS GS v1.1</text>
            
            <g id="needle-group" style="transition: transform 0.1s linear; transform: rotate(0deg); transform-origin: 100px 100px;">
                <line x1="100" y1="100" x2="100" y2="18" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                <circle cx="100" cy="100" r="4" fill="#fff"/>
            </g>
        </svg>
    </div>

    <div class="bottom-half" id="bottom-container">
        <iframe src="https://hackaday.com" id="tank-frame"></iframe>
    </div>
</div>

<script>
    const targetSelect = document.getElementById('target-speed');
    const needleGroup = document.getElementById('needle-group');
    const speedVal = document.getElementById('speed-val');
    const btn = document.getElementById('engage-btn');
    const frame = document.getElementById('tank-frame');
    const container = document.getElementById('bottom-container');
    
    function adjustScale() {
        const scaleFactor = container.offsetWidth / 1400;
        frame.style.transform = `scale(${scaleFactor})`;
    }

    function reloadIframe() { frame.src = frame.src; }

    window.addEventListener('load', adjustScale);
    window.addEventListener('resize', adjustScale);

    let watchID = null;

    for (let i = 0; i <= 30; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = i + " KTS";
        if (i === 18) opt.selected = true;
        targetSelect.appendChild(opt);
    }

    function update(kts) {
        const target = parseFloat(targetSelect.value);
        const diff = kts - target;
        let deg = Math.min(Math.max(diff * 9, -90), 90);
        needleGroup.style.transform = `rotate(${deg}deg)`;
        speedVal.textContent = Math.round(kts);
        speedVal.style.fill = Math.abs(diff) <= 3 ? "#00ff00" : "#ffcc00";
    }

    btn.onclick = () => {
        if (watchID === null) {
            if ("geolocation" in navigator) {
                watchID = navigator.geolocation.watchPosition(
                    (p) => update((p.coords.speed || 0) * 1.94384),
                    (e) => console.error(e),
                    { enableHighAccuracy: true, maximumAge: 0 }
                );
                btn.innerText = "STOP";
                btn.classList.add('active');
            }
        } else {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            btn.innerText = "ENGAGE";
            btn.classList.remove('active');
            update(0);
        }
    };
</script>

</body>
</html>
