<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>the Phil App</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: #fff; font-family: sans-serif;
            overflow: hidden;
        }
        .container { 
            display: flex; flex-direction: column; height: 100vh; width: 100vw; 
            background: #000;
        }
        
        .top-half { 
            flex: 1.4; /* Larger area for the 150% gauge */
            position: relative; 
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            border-bottom: 1px solid #333;
            z-index: 2;
        }

        .bottom-half { 
            flex: 0.6; 
            background: #000; 
            overflow: hidden; 
            position: relative;
            width: 100%;
        }

        #tank-frame {
            position: absolute;
            top: 0; left: 0; border: none;
            width: 1400px; height: 1800px;
            transform-origin: 0 0;
            background: #000;
        }
        
        .controls {
            position: absolute; top: 15px; width: 92%;
            display: flex; justify-content: space-between; gap: 8px; z-index: 10;
        }

        .btn-group { display: flex; gap: 8px; }

        select, button {
            background: #1a1a1a; color: #fff; border: 1px solid #444; 
            padding: 10px; font-size: 0.9rem; border-radius: 4px;
            outline: none;
        }
        
        #engage-btn.active { background: #dc3545; border-color: #ff0000; }
        #reload-tank { background: #333; }

        /* Gauge Scaled to 150% (Max 675px) */
        #gauge-svg { width: 98vw; max-width: 675px; margin-top: 35px; }
        .digital-speed { font-size: 26px; font-weight: bold; fill: #00ff00; }
        .digital-unit { font-size: 8px; fill: #666; letter-spacing: 1.5px; }
    </style>
</head>
<link rel="manifest" href="tank.json">
<body>

<div class="container">
    <div class="top-half">
        <div class="controls">
            <select id="target-speed"></select>
            <div class="btn-group">
                <button id="reload-tank" onclick="reloadIframe()">Reload Tank</button>
                <button id="engage-btn">ENGAGE</button>
            </div>
        </div>

        <svg id="gauge-svg" viewBox="0 0 200 135">
            <path d="M 15 100 A 85 85 0 0 1 185 100" fill="none" stroke="#222" stroke-width="14" stroke-linecap="round"/>
            
            <path d="M 15 100 A 85 85 0 0 1 185 100" fill="none" stroke="#ffcc00" stroke-width="14" />
            
            <path d="M 100 15 A 85 85 0 0 1 143.2 26.5" fill="none" stroke="#00ff00" stroke-width="14" transform="rotate(-27 100 100)" />
            <path d="M 100 15 A 85 85 0 0 0 56.8 26.5" fill="none" stroke="#00ff00" stroke-width="14" transform="rotate(27 100 100)" />

            <g stroke="#000" stroke-width="1.5">
                <line x1="100" y1="15" x2="100" y2="30" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(9 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(18 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(27 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(36 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(45 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(54 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(63 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(72 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(81 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(90 100 100)" />
                
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(-9 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(-18 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(-27 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(-36 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(-45 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(-54 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(-63 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(-72 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(-81 100 100)" />
                <line x1="100" y1="15" x2="100" y2="25" transform="rotate(-90 100 100)" />
            </g>

            <text x="100" y="124" text-anchor="middle" class="digital-speed" id="speed-val">0</text>
            <text x="100" y="132" text-anchor="middle" class="digital-unit">KTS GS</text>
            
            <g id="needle-group" style="transition: transform 0.1s linear; transform: rotate(0deg); transform-origin: 100px 100px;">
                <line x1="100" y1="100" x2="100" y2="20" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                <circle cx="100" cy="100" r="4" fill="#fff"/>
            </g>
        </svg>
    </div>

    <div class="bottom-half" id="bottom-container">
        <iframe src="http://192.168.3.1/OPS/DevicesTank%2032%20Landscape" id="tank-frame"></iframe>
    </div>
</div>

<script>
    const targetSelect = document.getElementById('target-speed');
    const needleGroup = document.getElementById('needle-group');
    const speedVal = document.getElementById('speed-val');
    const btn = document.getElementById('engage-btn');
    const frame = document.getElementById('tank-frame');
    const container = document.getElementById('bottom-container');
    
    function adjustScale() {
        const scaleFactor = container.offsetWidth / 1400;
        frame.style.transform = `scale(${scaleFactor})`;
    }

    function reloadIframe() { frame.src = frame.src; }

    window.addEventListener('load', adjustScale);
    window.addEventListener('resize', adjustScale);

    let watchID = null;

    for (let i = 0; i <= 30; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = i + " KTS";
        if (i === 18) opt.selected = true;
        targetSelect.appendChild(opt);
    }

    function update(kts) {
        const target = parseFloat(targetSelect.value);
        const diff = kts - target;
        // 9 degrees per knot movement for 0.1kt precision
        let deg = Math.min(Math.max(diff * 9, -90), 90);
        needleGroup.style.transform = `rotate(${deg}deg)`;
        speedVal.textContent = Math.round(kts);
        
        if (Math.abs(diff) <= 3) speedVal.style.fill = "#00ff00";
        else speedVal.style.fill = "#ffcc00";
    }

    btn.onclick = () => {
        if (watchID === null) {
            if ("geolocation" in navigator) {
                watchID = navigator.geolocation.watchPosition(
                    (p) => update((p.coords.speed || 0) * 1.94384),
                    (e) => console.error(e),
                    { enableHighAccuracy: true, maximumAge: 0 }
                );
                btn.innerText = "STOP";
                btn.classList.add('active');
            }
        } else {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            btn.innerText = "ENGAGE";
            btn.classList.remove('active');
            update(0);
        }
    };
</script>

</body>
</html>
