<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gauge Test</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { background: #000; width: 90vw; height: auto; }
    </style>
</head>
<body>

<canvas id="gauge" width="400" height="300"></canvas>

<script>
    const canvas = document.getElementById('gauge');
    const ctx = canvas.getContext('2d');

    function draw() {
        const cx = 200; // Center X
        const cy = 250; // Center Y (The pivot point)
        const radius = 180;

        // Arc spans from approx 8 o'clock to 4 o'clock
        const startAngle = Math.PI * 1.1;
        const endAngle = Math.PI * 1.9;
        const totalArc = endAngle - startAngle;

        ctx.clearRect(0, 0, 400, 300);

        // 1. Draw the Green Arch
        ctx.beginPath();
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.strokeStyle = '#00FF00'; // Pure Green
        ctx.lineWidth = 6;
        ctx.stroke();

        // 2. Draw 1kt Increments
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#00FF00';
        ctx.fillStyle = '#FFFFFF';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';

        for (let i = -5; i <= 5; i++) {
            // Calculate angle for each kt (Ideal 0 is at 12 o'clock / 1.5 * PI)
            const angle = (Math.PI * 1.5) + (i * (totalArc / 10));

            // Draw tick mark
            const innerR = radius - 10;
            const outerR = radius + 5;

            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(angle) * innerR, cy + Math.sin(angle) * innerR);
            ctx.lineTo(cx + Math.cos(angle) * outerR, cy + Math.sin(angle) * outerR);
            ctx.stroke();

            // Draw Label
            const labelR = radius + 25;
            const lx = cx + Math.cos(angle) * labelR;
            const ly = cy + Math.sin(angle) * labelR;
            ctx.fillText(i === 0 ? "IDEAL" : i, lx, ly);
        }

        // 3. Draw Pointer (Fixed at 12 o'clock for now)
        const needleAngle = Math.PI * 1.5;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(needleAngle + Math.PI/2);

        ctx.beginPath();
        ctx.moveTo(-8, 0);       // Left base
        ctx.lineTo(0, -radius + 15); // Tip
        ctx.lineTo(8, 0);        // Right base
        ctx.fillStyle = '#FFFFFF'; // White needle for visibility
        ctx.fill();
        ctx.restore();

        // Center Pin
        ctx.beginPath();
        ctx.arc(cx, cy, 10, 0, Math.PI * 2);
        ctx.fillStyle = '#FFFFFF';
        ctx.fill();
    }

    draw();
</script>
</body>
</html>
