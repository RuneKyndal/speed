<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HeliSpeed Glass</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: #fff; font-family: sans-serif;
            overflow: hidden;
        }
        .container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        /* Top 50%: Speed Gauge */
        .top-half { 
            flex: 1; position: relative; 
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            border-bottom: 1px solid #444;
            z-index: 2;
        }

        /* Bottom 50%: Tank Display */
        .bottom-half { 
            flex: 1; 
            background: #000; 
            overflow: hidden; 
            position: relative;
            width: 100%;
        }

        #tank-frame {
            position: absolute;
            top: 0;
            left: 0;
            border: none;
            /* 2800px provides ~42% scale. 
               Lower this number to make it bigger, increase it to make it smaller. */
            width: 2800px; 
            height: 2500px;
            transform-origin: 0 0;
            background: #000;
        }
        
        .controls {
            position: absolute; top: 15px; width: 92%;
            display: flex; justify-content: space-between; z-index: 10;
        }
        select, button {
            background: #222; color: #fff; border: 1px solid #444; 
            padding: 8px; font-size: 0.85rem; border-radius: 4px;
        }
        #engage-btn.active { background: #dc3545; }

        #gauge-svg { width: 95vw; max-width: 450px; margin-top: 20px; }
        .digital-speed { font-size: 22px; font-weight: bold; fill: #00ff00; }
        .digital-unit { font-size: 7px; fill: #666; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-half">
        <div class="controls">
            <select id="target-speed"></select>
            <button id="engage-btn">ENGAGE</button>
        </div>
        <svg id="gauge-svg" viewBox="0 0 200 135">
            <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#222" stroke-width="10" stroke-linecap="round"/>
            <g stroke="#555" stroke-width="1.5">
                <line x1="20" y1="100" x2="28" y2="100" />
                <line x1="100" y1="20" x2="100" y2="28" stroke="#00ff00" />
                <line x1="172" y1="100" x2="180" y2="100" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(-18 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(-36 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(-54 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(-72 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(18 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(36 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(54 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(72 100 100)" />
            </g>
            <text x="100" y="124" text-anchor="middle" class="digital-speed" id="speed-val">0</text>
            <text x="100" y="132" text-anchor="middle" class="digital-unit">KTS GS</text>
            <g id="needle-group" style="transition: transform 0.2s linear; transform: rotate(0deg); transform-origin: 100px 100px;">
                <line x1="100" y1="100" x2="100" y2="25" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                <circle cx="100" cy="100" r="4" fill="#fff"/>
            </g>
        </svg>
    </div>

    <div class="bottom-half" id="bottom-container">
        <iframe src="tank/tank.html" id="tank-frame"></iframe>
    </div>
</div>

<script>
    const targetSelect = document.getElementById('target-speed');
    const needleGroup = document.getElementById('needle-group');
    const speedVal = document.getElementById('speed-val');
    const btn = document.getElementById('engage-btn');
    const frame = document.getElementById('tank-frame');
    const container = document.getElementById('bottom-container');
    
    function adjustScale() {
        const containerWidth = container.offsetWidth;
        // Setting virtualWidth to 2800 for the requested scale
        const virtualWidth = 2800; 
        const scaleFactor = containerWidth / virtualWidth;
        frame.style.transform = `scale(${scaleFactor})`;
    }

    window.addEventListener('load', adjustScale);
    window.addEventListener('resize', adjustScale);

    let watchID = null;

    for (let i = 0; i <= 30; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = i + " KTS";
        if (i === 18) opt.selected = true;
        targetSelect.appendChild(opt);
    }

    function update(kts) {
        const target = parseFloat(targetSelect.value);
        const diff = kts - target;
        let deg = Math.min(Math.max(diff * 18, -90), 90);
        needleGroup.style.transform = `rotate(${deg}deg)`;
        speedVal.textContent = Math.round(kts);
        if (Math.abs(diff) <= 1) speedVal.style.fill = "#00ff00";
        else if (Math.abs(diff) <= 2) speedVal.style.fill = "#ffcc00";
        else speedVal.style.fill = "#ff4444";
    }

    btn.onclick = () => {
        if (watchID === null) {
            if ("geolocation" in navigator) {
                watchID = navigator.geolocation.watchPosition(
                    (p) => update((p.coords.speed || 0) * 1.94384),
                    (e) => console.error(e),
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                );
                btn.innerText = "STOP";
                btn.classList.add('active');
            }
        } else {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            btn.innerText = "ENGAGE";
            btn.classList.remove('active');
            update(0);
        }
    };
</script>

</body>
</html>
