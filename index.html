<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HeliSpeed Ultra</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: #fff; font-family: sans-serif;
            overflow: hidden;
        }
        .container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        
        /* Layout */
        .top-ui { 
            position: absolute; top: 10px; left: 0; right: 0; 
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 0 15px; z-index: 10;
        }

        /* Controls */
        select { 
            background: #222; color: #fff; border: 1px solid #444; 
            padding: 8px; font-size: 1rem; border-radius: 5px; width: 120px;
        }
        #engage-btn {
            background: #007bff; color: white; border: none; 
            padding: 8px 15px; font-size: 0.9rem; border-radius: 5px; font-weight: bold;
        }
        #engage-btn.active { background: #dc3545; }

        /* Gauge Section */
        .gauge-area { 
            flex: 1; display: flex; justify-content: center; align-items: center; 
            margin-top: -10vh; /* Shift up to keep lower half clear */
        }
        #gauge-container { width: 95vw; max-width: 500px; }

        /* Speed Text Inside Arc */
        .speed-val { font-size: 80px; font-weight: bold; fill: #00ff00; }
        .speed-unit { font-size: 12px; fill: #666; font-weight: normal; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-ui">
        <select id="target-speed"></select>
        <button id="engage-btn">ENGAGE</button>
    </div>

    <div class="gauge-area">
        <svg id="gauge-container" viewBox="0 0 200 140">
            <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#222" stroke-width="12" stroke-linecap="round"/>
            
            <g id="ticks" stroke="#444" stroke-width="2">
                <line x1="20" y1="100" x2="30" y2="100" /> <line x1="100" y1="20" x2="100" y2="30" stroke="#00ff00" /> <line x1="170" y1="100" x2="180" y2="100" /> <line x1="100" y1="20" x2="100" y2="30" transform="rotate(-18 100 100)" />
                <line x1="100" y1="20" x2="100" y2="30" transform="rotate(-36 100 100)" />
                <line x1="100" y1="20" x2="100" y2="30" transform="rotate(-54 100 100)" />
                <line x1="100" y1="20" x2="100" y2="30" transform="rotate(-72 100 100)" />
                <line x1="100" y1="20" x2="100" y2="30" transform="rotate(18 100 100)" />
                <line x1="100" y1="20" x2="100" y2="30" transform="rotate(36 100 100)" />
                <line x1="100" y1="20" x2="100" y2="30" transform="rotate(54 100 100)" />
                <line x1="100" y1="20" x2="100" y2="30" transform="rotate(72 100 100)" />
            </g>

            <text x="100" y="95" text-anchor="middle" class="speed-val" id="current-speed">0</text>
            <text x="100" y="115" text-anchor="middle" class="speed-unit">KNOTS GS</text>
            
            <g id="needle-group" transform="rotate(0 100 100)" style="transition: transform 0.4s ease-out;">
                <line x1="100" y1="100" x2="100" y2="25" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                <circle cx="100" cy="100" r="4" fill="#fff"/>
            </g>
        </svg>
    </div>
</div>

<script>
    const targetSelect = document.getElementById('target-speed');
    const needleGroup = document.getElementById('needle-group');
    const speedDisplay = document.getElementById('current-speed');
    const btn = document.getElementById('engage-btn');
    
    let watchID = null;

    // Populate Dropdown 0-30 kts
    for (let i = 0; i <= 30; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i + " KTS";
        if (i === 18) opt.selected = true;
        targetSelect.appendChild(opt);
    }

    function updateDisplay(currentKnots) {
        const target = parseFloat(targetSelect.value);
        const diff = currentKnots - target;
        
        // Deflection: 18 degrees per knot
        let deflection = diff * 18; 
        deflection = Math.min(Math.max(deflection, -90), 90);
        
        needleGroup.style.transform = `rotate(${deflection}deg)`;
        speedDisplay.textContent = Math.round(currentKnots);
        
        // Color shifts based on error
        if (Math.abs(diff) <= 1) speedDisplay.style.fill = "#00ff00";
        else if (Math.abs(diff) <= 2) speedDisplay.style.fill = "#ffcc00";
        else speedDisplay.style.fill = "#ff4444";
    }

    btn.onclick = () => {
        if (watchID === null) {
            if ("geolocation" in navigator) {
                watchID = navigator.geolocation.watchPosition(
                    (pos) => {
                        const knots = (pos.coords.speed || 0) * 1.94384;
                        updateDisplay(knots);
                    },
                    (err) => console.error(err),
                    { enableHighAccuracy: true }
                );
                btn.innerText = "STOP";
                btn.classList.add('active');
            }
        } else {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            btn.innerText = "ENGAGE";
            btn.classList.remove('active');
            updateDisplay(0);
        }
    };
</script>

</body>
</html>
