<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HeliSpeed Glass</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: #fff; font-family: sans-serif;
            overflow: hidden;
        }
        .container { display: flex; flex-direction: column; height: 100vh; }
        
        /* Top 50%: HeliSpeed UI */
        .top-half { 
            flex: 1; position: relative; 
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            border-bottom: 1px solid #444;
            z-index: 2;
        }

        /* Bottom 50%: Landscape Iframe Container */
        .bottom-half { 
            flex: 1; 
            background: #1a1a1a; 
            overflow: hidden; 
            position: relative;
            width: 100%;
        }

        .scaled-iframe {
            /* 1. We define the landscape dimensions (swapped for rotation) */
            /* Since the phone is portrait, the "width" of the landscape site 
               must match the "height" of this bottom container. */
            width: 100vh; 
            height: 100vw; 
            border: none;
            position: absolute;
            
            /* 2. Rotate and Position */
            top: 0;
            left: 100%; /* Move it out of view to rotate it back in */
            transform: rotate(90deg);
            transform-origin: top left;

            /* 3. Scaling to fit the width of the phone */
            /* This assumes the landscape site wants to be 1200px wide */
            /* You can adjust 1200 to match the site's natural width */
            transform: rotate(90deg) scale(calc(100vh / 2 / 600)); 
        }
        
        /* Simplified Landscape Fix: Forced Fit */
        .landscape-iframe {
            position: absolute;
            width: 50vh;  /* The height of the portrait bottom-half */
            height: 100vw; /* The width of the portrait phone */
            top: 0;
            left: 100%;
            transform: rotate(90deg);
            transform-origin: top left;
            border: none;
        }

        /* Best Universal Landscape Fit */
        .bottom-half iframe {
            position: absolute;
            /* Create a virtual landscape box */
            width: 200%;  /* Acts as the landscape width */
            height: 100%; /* Acts as the landscape height */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg) scale(0.5);
            border: none;
        }

        /* Floating Controls */
        .controls {
            position: absolute; top: 10px; width: 92%;
            display: flex; justify-content: space-between; z-index: 10;
        }
        select, button {
            background: #222; color: #fff; border: 1px solid #444; 
            padding: 8px; font-size: 0.85rem; border-radius: 4px;
            outline: none;
        }
        #engage-btn.active { background: #dc3545; border-color: #ff0000; }

        /* Gauge Elements */
        #gauge-svg { width: 95vw; max-width: 450px; margin-top: 20px; }
        .digital-speed { font-size: 22px; font-weight: bold; fill: #00ff00; }
        .digital-unit { font-size: 7px; fill: #666; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-half">
        <div class="controls">
            <select id="target-speed"></select>
            <button id="engage-btn">ENGAGE</button>
        </div>

        <svg id="gauge-svg" viewBox="0 0 200 135">
            <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#222" stroke-width="10" stroke-linecap="round"/>
            <g stroke="#555" stroke-width="1.5">
                <line x1="20" y1="100" x2="28" y2="100" />
                <line x1="100" y1="20" x2="100" y2="28" stroke="#00ff00" />
                <line x1="172" y1="100" x2="180" y2="100" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(-18 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(-36 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(-54 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(-72 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(18 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(36 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(54 100 100)" />
                <line x1="100" y1="20" x2="100" y2="28" transform="rotate(72 100 100)" />
            </g>
            <text x="100" y="124" text-anchor="middle" class="digital-speed" id="speed-val">0</text>
            <text x="100" y="132" text-anchor="middle" class="digital-unit">KTS GS</text>
            <g id="needle-group" style="transition: transform 0.2s linear; transform: rotate(0deg); transform-origin: 100px 100px;">
                <line x1="100" y1="100" x2="100" y2="25" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
                <circle cx="100" cy="100" r="4" fill="#fff"/>
            </g>
        </svg>
    </div>

    <div class="bottom-half">
        <iframe src="tank/tank.html"></iframe>
    </div>
</div>

<script>
    const targetSelect = document.getElementById('target-speed');
    const needleGroup = document.getElementById('needle-group');
    const speedVal = document.getElementById('speed-val');
    const btn = document.getElementById('engage-btn');
    
    let watchID = null;

    for (let i = 0; i <= 30; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i + " KTS";
        if (i === 18) opt.selected = true;
        targetSelect.appendChild(opt);
    }

    function update(kts) {
        const target = parseFloat(targetSelect.value);
        const diff = kts - target;
        let deg = diff * 18; 
        deg = Math.min(Math.max(deg, -90), 90);
        needleGroup.style.transform = `rotate(${deg}deg)`;
        speedVal.textContent = Math.round(kts);
        if (Math.abs(diff) <= 1) speedVal.style.fill = "#00ff00";
        else if (Math.abs(diff) <= 2) speedVal.style.fill = "#ffcc00";
        else speedVal.style.fill = "#ff4444";
    }

    btn.onclick = () => {
        if (watchID === null) {
            if ("geolocation" in navigator) {
                watchID = navigator.geolocation.watchPosition(
                    (p) => update((p.coords.speed || 0) * 1.94384),
                    (e) => console.error("GPS Error:", e.message),
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                );
                btn.innerText = "STOP";
                btn.classList.add('active');
            }
        } else {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            btn.innerText = "ENGAGE";
            btn.classList.remove('active');
            update(0);
        }
    };
</script>

</body>
</html>
