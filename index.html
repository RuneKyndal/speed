<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HeliSpeed Precision</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: #fff; font-family: sans-serif;
            overflow: hidden;
        }
        .container { display: flex; flex-direction: column; height: 100vh; }
        
        /* Top Half: 180 Degree Gauge */
        .top-half { 
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; 
            border-bottom: 2px solid #333;
        }
        #gauge-container { width: 90vw; max-width: 400px; }
        
        /* Bottom Half: UI */
        .bottom-half { 
            flex: 1; display: flex; flex-direction: column; 
            justify-content: space-evenly; align-items: center; padding: 10px;
        }
        
        .speed-readout { text-align: center; }
        .speed-val { font-size: 5rem; font-weight: bold; color: #00ff00; line-height: 1; }
        .speed-label { font-size: 1rem; color: #888; letter-spacing: 2px; }

        .controls { background: #1a1a1a; padding: 20px; border-radius: 15px; width: 80%; text-align: center; }
        select { 
            width: 100%; padding: 12px; font-size: 1.5rem; 
            background: #333; color: white; border: 1px solid #555; border-radius: 8px;
        }
        label { display: block; margin-bottom: 10px; color: #aaa; font-size: 0.9rem; }
        
        #engage-btn {
            width: 80%; padding: 20px; font-size: 1.5rem; font-weight: bold;
            background: #007bff; color: white; border: none; border-radius: 50px;
            text-transform: uppercase;
        }
        #engage-btn.active { background: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-half">
        <svg id="gauge-container" viewBox="0 0 200 120">
            <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#333" stroke-width="15" stroke-linecap="round"/>
            <line x1="100" y1="20" x2="100" y2="35" stroke="#00ff00" stroke-width="3"/>
            
            <text x="20" y="115" fill="#ff4444" font-size="10" text-anchor="middle">-5</text>
            <text x="100" y="15" fill="#00ff00" font-size="10" text-anchor="middle">IDEAL</text>
            <text x="180" y="115" fill="#ff4444" font-size="10" text-anchor="middle">+5</text>
            
            <g id="needle-group" transform="rotate(0 100 100)" style="transition: transform 0.3s ease-out;">
                <line x1="100" y1="100" x2="100" y2="25" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
                <circle cx="100" cy="100" r="5" fill="#fff"/>
            </g>
        </svg>
    </div>

    <div class="bottom-half">
        <div class="speed-readout">
            <div class="speed-val" id="current-speed">0.0</div>
            <div class="speed-label">KNOTS GS</div>
        </div>

        <div class="controls">
            <label>SELECT TARGET SPEED</label>
            <select id="target-speed"></select>
        </div>

        <button id="engage-btn">Engage GPS</button>
    </div>
</div>

<script>
    const targetSelect = document.getElementById('target-speed');
    const needleGroup = document.getElementById('needle-group');
    const speedDisplay = document.getElementById('current-speed');
    const btn = document.getElementById('engage-btn');
    
    let watchID = null;

    // Populate Dropdown 10-30 kts
    for (let i = 10; i <= 30; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i + " KNOTS";
        if (i === 18) opt.selected = true;
        targetSelect.appendChild(opt);
    }

    function updateDisplay(currentKnots) {
        const target = parseFloat(targetSelect.value);
        const diff = currentKnots - target;
        
        // Map +/- 5 knots to +/- 90 degrees
        // 0 diff = 0 degrees (Straight up)
        // +5 diff = 90 degrees (Far right)
        // -5 diff = -90 degrees (Far left)
        let deflection = diff * 18; 
        
        // Clamp to 180 degree total arc
        deflection = Math.min(Math.max(deflection, -90), 90);
        
        needleGroup.style.transform = `rotate(${deflection}deg)`;
        speedDisplay.innerText = currentKnots.toFixed(1);
        
        // Color coding for visual cue
        if (Math.abs(diff) <= 1) {
            speedDisplay.style.color = "#00ff00"; // Green if within 1kt
        } else if (Math.abs(diff) <= 3) {
            speedDisplay.style.color = "#ffcc00"; // Yellow
        } else {
            speedDisplay.style.color = "#ff4444"; // Red
        }
    }

    btn.onclick = () => {
        if (watchID === null) {
            if ("geolocation" in navigator) {
                watchID = navigator.geolocation.watchPosition(
                    (pos) => {
                        const mps = pos.coords.speed || 0;
                        const knots = mps * 1.94384;
                        updateDisplay(knots);
                    },
                    (err) => alert("GPS Error: " + err.message),
                    { enableHighAccuracy: true }
                );
                btn.innerText = "Stop";
                btn.classList.add('active');
            }
        } else {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            btn.innerText = "Engage GPS";
            btn.classList.remove('active');
            updateDisplay(parseFloat(targetSelect.value)); 
        }
    };
</script>

</body>
</html>
