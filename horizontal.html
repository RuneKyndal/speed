<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>the Phil App - Horizontal</title>
    <link rel="manifest" href="Horizontal.json">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: #fff; font-family: sans-serif;
            overflow: hidden;
        }
        .container { 
            display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; 
            justify-content: center; align-items: center;
        }
        
        .bottom-controls {
            position: absolute; bottom: 20px; width: 94%;
            display: flex; justify-content: space-between; z-index: 10;
        }

        select, button {
            background: #1a1a1a; color: #fff; border: 2px solid #444; 
            padding: 18px 30px; font-size: 1.6rem; border-radius: 12px;
            font-weight: bold; outline: none;
        }
        
        #engage-btn { background: #007aff; border: none; min-width: 180px; }
        #engage-btn.active { background: #dc3545; }

        #scale-container {
            width: 92vw; height: 100px;
            position: relative; background: #111;
            border: 2px solid #333; margin-top: -50px;
        }

        .zone { position: absolute; height: 100%; top: 0; opacity: 0.25; }
        .green-zone { left: 35%; width: 30%; background: #00ff00; }

        #deviation-bar {
            position: absolute; width: 12px; height: 150%;
            background: #fff; top: -25%; left: 50%;
            transform: translateX(-50%);
            transition: left 0.15s linear;
            box-shadow: 0 0 15px rgba(255,255,255,0.7);
            z-index: 5; border-radius: 2px;
        }

        .center-line {
            position: absolute; left: 50%; height: 100%;
            width: 2px; background: #888; z-index: 1;
        }

        .tick { position: absolute; bottom: 0; width: 2px; height: 20px; background: #444; }
        .tick.major { height: 40px; background: #888; }

        .scale-labels {
            position: absolute; top: -50px; width: 100%;
            display: flex; justify-content: space-between;
            font-weight: bold; font-size: 2.2rem;
        }

        .digital-display { text-align: center; margin-top: 40px; }
        #speed-val { font-size: 10rem; font-weight: bold; line-height: 0.9; color: #00ff00; }
        .unit { font-size: 1.5rem; color: #666; letter-spacing: 6px; }
    </style>
</head>
<body>

<div class="container">
    <div id="scale-container">
        <div class="scale-labels">
            <span id="label-min">8</span>
            <span id="label-target">18</span>
            <span id="label-max">28</span>
        </div>
        <div class="center-line"></div>
        <div class="zone green-zone"></div>
        <div id="ticks-layer"></div>
        <div id="deviation-bar"></div>
    </div>

    <div class="digital-display">
        <div id="speed-val">0</div>
        <div class="unit">KTS GS v1.3</div>
    </div>

    <div class="bottom-controls">
        <select id="target-speed"></select>
        <button id="engage-btn">ENGAGE</button>
    </div>
</div>

<script>
    const targetSelect = document.getElementById('target-speed');
    const devBar = document.getElementById('deviation-bar');
    const speedVal = document.getElementById('speed-val');
    const btn = document.getElementById('engage-btn');
    const ticksLayer = document.getElementById('ticks-layer');
    const labelMin = document.getElementById('label-min');
    const labelTarget = document.getElementById('label-target');
    const labelMax = document.getElementById('label-max');

    let watchID = null;

    function initTicks() {
        for (let i = 0; i <= 20; i++) {
            const tick = document.createElement('div');
            tick.className = 'tick' + (i % 5 === 0 ? ' major' : '');
            tick.style.left = (i * 5) + '%';
            ticksLayer.appendChild(tick);
        }
    }

    for (let i = 0; i <= 30; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.textContent = i + " KTS";
        if (i === 18) opt.selected = true;
        targetSelect.appendChild(opt);
    }

    function updateScaleUI() {
        const t = parseInt(targetSelect.value);
        labelTarget.textContent = t;
        labelMin.textContent = Math.max(0, t - 10);
        labelMax.textContent = t + 10;
    }

    targetSelect.onchange = updateScaleUI;

    function updatePosition(kts) {
        const target = parseFloat(targetSelect.value);
        const diff = kts - target;
        let percent = 50 + (diff * 5); 
        percent = Math.min(Math.max(percent, 0), 100);
        devBar.style.left = percent + '%';
        speedVal.textContent = Math.round(kts);
        speedVal.style.color = Math.abs(diff) <= 3 ? "#00ff00" : "#ffcc00";
    }

    btn.onclick = () => {
        if (watchID === null) {
            if ("geolocation" in navigator) {
                watchID = navigator.geolocation.watchPosition(
                    (p) => updatePosition((p.coords.speed || 0) * 1.94384),
                    (e) => alert(e.message),
                    { enableHighAccuracy: true, maximumAge: 0 }
                );
                btn.innerText = "STOP"; btn.classList.add('active');
            }
        } else {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            btn.innerText = "ENGAGE"; btn.classList.remove('active');
            updatePosition(0);
        }
    };

    initTicks();
    updateScaleUI();
</script>
</body>
</html>
