<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Phil App - Horizontal Bold</title>
    <link rel="manifest" href="Horizontal.json">
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: #fff; font-family: sans-serif;
            overflow: hidden;
        }
        .container { 
            display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; 
            justify-content: center; align-items: center;
        }
        
        .bottom-controls {
            position: absolute; bottom: 20px; width: 94%;
            display: flex; justify-content: space-between; z-index: 10;
        }

        select, button {
            background: #1a1a1a; color: #fff; border: 2px solid #666; 
            padding: 18px 30px; font-size: 1.6rem; border-radius: 12px;
            font-weight: bold; outline: none;
        }
        
        #engage-btn { background: #007aff; border: none; min-width: 180px; }
        #engage-btn.active { background: #dc3545; }

        /* Enhanced HSI Scale */
        #scale-container {
            width: 92vw; height: 110px;
            position: relative; background: #080808;
            border: 3px solid #444; margin-top: -40px;
        }

        /* Color Zones */
        .zone { position: absolute; height: 100%; top: 0; }
        .green-zone { 
            left: 35%; width: 30%; 
            background: rgba(144, 238, 144, 0.3); /* Lighter Green */
            border-left: 2px solid #90ee90; border-right: 2px solid #90ee90;
        }
        .yellow-left { left: 0; width: 35%; background: rgba(255, 255, 0, 0.15); }
        .yellow-right { left: 65%; width: 35%; background: rgba(255, 255, 0, 0.15); }

        /* The Bold White Deviation Bar */
        #deviation-bar {
            position: absolute; width: 14px; height: 160%;
            background: #fff; top: -30%; left: 50%;
            transform: translateX(-50%);
            transition: left 0.1s linear;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
            z-index: 10; border-radius: 3px;
        }

        /* Bold White Center Line */
        .center-line {
            position: absolute; left: 50%; height: 100%;
            width: 4px; background: #fff; z-index: 2;
            box-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* Bold White Tick Marks */
        .tick { position: absolute; bottom: 0; width: 3px; height: 25px; background: #fff; opacity: 0.8; }
        .tick.major { height: 50px; width: 4px; opacity: 1; }

        .scale-labels {
            position: absolute; top: -55px; width: 100%;
            display: flex; justify-content: space-between;
            font-weight: bold; font-size: 2.5rem; color: #fff;
        }

        /* Speed Readout */
        .digital-display { text-align: center; margin-top: 50px; }
        #speed-val { font-size: 11rem; font-weight: bold; line-height: 0.85; color: #90ee90; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .unit { font-size: 1.6rem; color: #888; letter-spacing: 8px; font-weight: bold; }

    </style>
</head>
<body>

<div class="container">
    <div id="scale-container">
        <div class="scale-labels">
            <span id="label-min">8</span>
            <span id="label-target">18</span>
            <span id="label-max">28</span>
        </div>
        <div class="yellow-left zone"></div>
        <div class="green-zone zone"></div>
        <div class="yellow-right zone"></div>
        
        <div class="center-line"></div>
        <div id="ticks-layer"></div>
        <div id="deviation-bar"></div>
    </div>

    <div class="digital-display">
        <div id="speed-val">0</div>
        <div class="unit">KTS GS v1.1</div>
    </div>

    <div class="bottom-controls">
        <select id="target-speed"></select>
        <button id="engage-btn">ENGAGE</button>
    </div>
</div>

<script>
    const targetSelect = document.getElementById('target-speed');
    const devBar = document.getElementById('deviation-bar');
    const speedVal = document.getElementById('speed-val');
    const btn = document.getElementById('engage-btn');
    const ticksLayer = document.getElementById('ticks-layer');
    const labelMin = document.getElementById('label-min');
    const labelTarget = document.getElementById('label-target');
    const labelMax = document.getElementById('label-max');

    let watchID = null;

    function initTicks() {
        ticksLayer.innerHTML = '';
        for (let i = 0; i <= 20; i++) {
            const tick = document.createElement('div');
            tick.className = 'tick' + (i % 5 === 0 ? ' major' : '');
            tick.style.left = (i * 5) + '%';
            ticksLayer.appendChild(tick);
        }
    }

    for (let i = 0; i <= 30; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.textContent = i + " KTS";
        if (i === 18) opt.selected = true;
        targetSelect.appendChild(opt);
    }

    function updateScaleUI() {
        const t = parseInt(targetSelect.value);
        labelTarget.textContent = t;
        labelMin.textContent = Math.max(0, t - 10);
        labelMax.textContent = t + 10;
    }

    targetSelect.onchange = updateScaleUI;

    function updatePosition(kts) {
        const target = parseFloat(targetSelect.value);
        const diff = kts - target;
        
        let percent = 50 + (diff * 5); 
        percent = Math.min(Math.max(percent, 0), 100);
        devBar.style.left = percent + '%';
        
        speedVal.textContent = Math.round(kts);

        // Enhanced Color Logic
        const absDiff = Math.abs(diff);
        if (absDiff <= 3) {
            speedVal.style.color = "#90ee90"; // Light Green
        } else if (absDiff <= 10) {
            speedVal.style.color = "#ffff00"; // Yellow
        } else {
            speedVal.style.color = "#ff3b30"; // Red (Out of Scale)
        }
    }

    btn.onclick = () => {
        if (watchID === null) {
            if ("geolocation" in navigator) {
                watchID = navigator.geolocation.watchPosition(
                    (p) => updatePosition((p.coords.speed || 0) * 1.94384),
                    (e) => alert(e.message),
                    { enableHighAccuracy: true, maximumAge: 0 }
                );
                btn.innerText = "STOP"; btn.classList.add('active');
            }
        } else {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            btn.innerText = "ENGAGE"; btn.classList.remove('active');
            updatePosition(0);
        }
    };

    initTicks();
    updateScaleUI();
</script>
</body>
</html>
