<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>the Phil App - Landscape</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: #000; color: #fff; font-family: sans-serif;
            overflow: hidden;
        }
        .container { 
            display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; 
            justify-content: center; align-items: center;
            background: #000;
        }
        
        .controls {
            position: absolute; top: 15px; width: 95%;
            display: flex; justify-content: space-between; z-index: 10;
        }

        select, button {
            background: #1a1a1a; color: #fff; border: 2px solid #444; 
            padding: 15px 30px; font-size: 1.5rem; border-radius: 10px;
            font-weight: bold;
            outline: none;
        }
        
        #engage-btn.active { background: #dc3545; border-color: #ff0000; }

        #gauge-svg { 
            width: 98vw; 
            height: 85vh;
            margin-top: 50px;
        }

        /* Styling for the Scale Reference Numbers */
        .scale-label { font-size: 8px; fill: #aaa; font-weight: bold; }
        .digital-speed { font-size: 24px; font-weight: bold; fill: #00ff00; }
        .digital-unit { font-size: 7px; fill: #666; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="controls">
        <select id="target-speed"></select>
        <button id="engage-btn">ENGAGE</button>
    </div>

    <svg id="gauge-svg" viewBox="0 5 200 135">
        <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#222" stroke-width="12" stroke-linecap="round"/>
        
        <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#ffcc00" stroke-width="12" />
        <path d="M 100 20 A 80 80 0 0 1 143.2 31.8" fill="none" stroke="#00ff00" stroke-width="12" transform="rotate(-27 100 100)" />
        <path d="M 100 20 A 80 80 0 0 0 56.8 31.8" fill="none" stroke="#00ff00" stroke-width="12" transform="rotate(27 100 100)" />

        <text x="15" y="112" text-anchor="middle" class="scale-label" id="label-min">0</text>
        <text x="100" y="15" text-anchor="middle" class="scale-label" id="label-target">10</text>
        <text x="185" y="112" text-anchor="middle" class="scale-label" id="label-max">20</text>

        <g id="tick-group" stroke="#000" stroke-width="1.5">
            </g>

        <text x="100" y="124" text-anchor="middle" class="digital-speed" id="speed-val">0</text>
        <text x="100" y="132" text-anchor="middle" class="digital-unit">KTS GS</text>
        
        <g id="needle-group" style="transition: transform 0.2s linear; transform: rotate(0deg); transform-origin: 100px 100px;">
            <line x1="100" y1="100" x2="100" y2="25" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
            <circle cx="100" cy="100" r="4" fill="#fff"/>
        </g>
    </svg>
</div>

<script>
    const targetSelect = document.getElementById('target-speed');
    const needleGroup = document.getElementById('needle-group');
    const speedVal = document.getElementById('speed-val');
    const btn = document.getElementById('engage-btn');
    
    const labelMin = document.getElementById('label-min');
    const labelTarget = document.getElementById('label-target');
    const labelMax = document.getElementById('label-max');
    const tickGroup = document.getElementById('tick-group');

    let watchID = null;

    // Generate 1-kt Ticks (-10 to +10 range = 180 degrees)
    function drawTicks() {
        tickGroup.innerHTML = '';
        for (let i = -90; i <= 90; i += 9) {
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", "100");
            l.setAttribute("y1", "20");
            l.setAttribute("x2", "100");
            l.setAttribute("y2", "30");
            l.setAttribute("transform", `rotate(${i} 100 100)`);
            tickGroup.appendChild(l);
        }
    }

    // Populate Dropdown and Initial Labels
    for (let i = 0; i <= 30; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = i + " KTS";
        if (i === 18) opt.selected = true;
        targetSelect.appendChild(opt);
    }

    function updateLabels() {
        const t = parseInt(targetSelect.value);
        labelTarget.textContent = t;
        labelMin.textContent = Math.max(0, t - 10);
        labelMax.textContent = t + 10;
    }

    targetSelect.onchange = updateLabels;

    function update(kts) {
        const target = parseFloat(targetSelect.value);
        const diff = kts - target;
        // 9 degrees per knot (180 deg / 20 kts)
        let deg = Math.min(Math.max(diff * 9, -90), 90);
        needleGroup.style.transform = `rotate(${deg}deg)`;
        speedVal.textContent = Math.round(kts);
        
        if (Math.abs(diff) <= 3) speedVal.style.fill = "#00ff00";
        else speedVal.style.fill = "#ffcc00";
    }

    btn.onclick = () => {
        if (watchID === null) {
            if ("geolocation" in navigator) {
                watchID = navigator.geolocation.watchPosition(
                    (p) => update((p.coords.speed || 0) * 1.94384),
                    (e) => console.error(e),
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                );
                btn.innerText = "STOP";
                btn.classList.add('active');
            }
        } else {
            navigator.geolocation.clearWatch(watchID);
            watchID = null;
            btn.innerText = "ENGAGE";
            btn.classList.remove('active');
            update(0);
        }
    };

    drawTicks();
    updateLabels();
</script>

</body>
</html>
